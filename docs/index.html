<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooze | Terminal Audio Downloader</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #58a6ff; font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; max-width: 600px; line-height: 1.5; color: #8b949e; }
        .terminal-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px 40px;
            margin: 30px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .code {
            color: #2ea043;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-family: sans-serif;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2ea043; }
        .ascii { color: #2ea043; white-space: pre; font-size: 0.8rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="ascii">
  __  __
 |  \/  | ___   ___  _______
 | |\/| |/ _ \ / _ \|_  / _ \
 | |  | | (_) | (_) |/ /  __/
 |_|  |_|\___/ \___//___\___|
    </div>

    <h1>Mooze</h1>
    <p>A sleek, ultra-responsive Terminal User Interface (TUI) music downloading dashboard. Powered by textual and yt-dlp.</p>

    <div class="terminal-box">
        <span style="color: #8b949e;">$</span> <span class="code">pip install mooze-dl</span><br><br>
        <span style="color: #8b949e;">$</span> <span class="code">mooze</span>
    </div>

    <a href="https://github.com/X0fx/mooze" class="btn">View Source on GitHub</a>

</body>
</html>
